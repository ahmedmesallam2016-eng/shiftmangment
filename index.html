<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام الورديات والإضافي - النسخة المتطورة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
               ROOT VARIABLES & THEMING
            ============================================================ */
        :root {
            --bg-primary: #eef2f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.10);
            --radius-sm: 0.75rem;
            --radius-md: 1.25rem;
            --radius-lg: 2rem;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --gold: #d4af37;
            --gold-dark: #b8860b;
            --gold-light: #f5e6b0;
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --green: #10b981;
            --red: #ef4444;
            --orange: #f59e0b;
            --slate: #64748b;
            --font: 'Tajawal', 'Segoe UI', sans-serif;
            --header-bg: linear-gradient(145deg, #0f172a, #1e293b);
            --card-border: 1px solid rgba(0, 0, 0, 0.05);
            --input-bg: #f9fafb;
            --input-border: #cbd5e1;
            --table-stripe: #f9f9ff;
            --table-hover: #f1f5f9;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #2d3a4f;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.5);
            --card-border: 1px solid #334155;
            --input-bg: #2d3a4f;
            --input-border: #475569;
            --table-stripe: #1a2738;
            --table-hover: #2d3a4f;
            --header-bg: linear-gradient(145deg, #0a0f1a, #162032);
        }

        /* ============================================================
               RESET & BASE
            ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1.5rem;
            transition: background var(--transition), color var(--transition);
        }

        .page {
            display: none;
            max-width: 1440px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 2rem;
            transition: background var(--transition), box-shadow var(--transition);
            position: relative;
            overflow: hidden;
        }

        /* ============================================================
               SCROLLBAR
            ============================================================ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* ============================================================
               LOGIN PAGE
            ============================================================ */
        #loginPage {
            display: block;
            max-width: 480px;
            text-align: center;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            border-top: 6px solid var(--gold);
            box-shadow: var(--shadow-lg);
        }

        .login-logo {
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--gold-dark);
            letter-spacing: 1px;
        }
        .login-logo span {
            color: var(--gold);
        }

        .login-subtitle {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--gold-light);
            display: inline-block;
            margin: 0.5rem 0;
            padding-bottom: 0.25rem;
        }

        .login-designer {
            font-size: 1.2rem;
            color: var(--gold-dark);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .login-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-color);
        }

        .login-input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            margin: 0.6rem 0;
            border: 2px solid var(--input-border);
            border-radius: 3rem;
            background: var(--input-bg);
            font-size: 1rem;
            transition: var(--transition);
            color: var(--text-primary);
            font-family: var(--font);
        }
        .login-input:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
        }

        .login-btn {
            background: linear-gradient(145deg, var(--gold), var(--gold-dark));
            color: #fff;
            width: 100%;
            padding: 0.85rem;
            border-radius: 3rem;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            margin-top: 0.5rem;
            transition: var(--transition);
            font-family: var(--font);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .login-footer {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
            border-top: 2px solid var(--border-color);
            padding-top: 1rem;
        }
        .login-footer a {
            color: var(--gold-dark);
            text-decoration: none;
            font-weight: 600;
        }

        /* ============================================================
               THEME TOGGLE
            ============================================================ */
        .theme-toggle-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .theme-toggle {
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 3rem;
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 1.2rem;
            transition: var(--transition);
            color: var(--text-primary);
        }
        .theme-toggle:hover {
            border-color: var(--gold);
            transform: scale(1.05);
        }
        .theme-toggle .toggle-track {
            width: 36px;
            height: 20px;
            border-radius: 20px;
            background: var(--border-color);
            position: relative;
            transition: var(--transition);
        }
        .theme-toggle .toggle-track .toggle-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--gold);
            position: absolute;
            top: 2px;
            right: 2px;
            transition: var(--transition);
        }
        [data-theme="dark"] .theme-toggle .toggle-track .toggle-thumb {
            right: 18px;
            background: #fbbf24;
        }
        [data-theme="dark"] .theme-toggle .toggle-track {
            background: #334155;
        }

        /* ============================================================
               PAGE HEADER
            ============================================================ */
        .page-header {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--border-color);
        }

        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .page-header h1 span {
            background: var(--gold-light);
            color: var(--gold-dark);
            padding: 0.1rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .logout-btn {
            background: var(--red);
            color: #fff;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            font-size: 0.9rem;
        }
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.3);
        }

        /* ============================================================
               CARDS
            ============================================================ */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            margin-bottom: 1.8rem;
            box-shadow: var(--shadow-sm);
            border: var(--card-border);
            transition: box-shadow var(--transition), background var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .card-header h3 {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.15rem;
        }
        .card-header .badge {
            background: var(--gold-light);
            color: var(--gold-dark);
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.75rem;
        }

        /* ============================================================
               DASHBOARD STATS
            ============================================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.8rem;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 1.2rem 1.5rem;
            border: var(--card-border);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }
        .stat-icon {
            font-size: 2.2rem;
            width: 3.5rem;
            height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gold-light);
            border-radius: 50%;
            flex-shrink: 0;
        }
        .stat-info {
            flex: 1;
        }
        .stat-info .stat-number {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .stat-info .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ============================================================
               FORM ROW
            ============================================================ */
        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-bottom: 1.2rem;
        }
        .form-group {
            flex: 1;
            min-width: 150px;
        }
        .form-group label {
            font-weight: 600;
            margin-bottom: 0.25rem;
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.6rem 1rem;
            border: 2px solid var(--input-border);
            border-radius: 1rem;
            font-family: var(--font);
            background: var(--input-bg);
            color: var(--text-primary);
            transition: var(--transition);
            font-size: 0.95rem;
        }
        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.12);
            background: var(--bg-card);
        }

        /* ============================================================
               BUTTONS
            ============================================================ */
        button {
            background: var(--blue);
            color: #fff;
            border: none;
            padding: 0.55rem 1.4rem;
            border-radius: 2rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
        }
        button:active {
            transform: scale(0.97);
        }

        button.success {
            background: var(--green);
        }
        button.success:hover {
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
        }
        button.danger {
            background: var(--red);
        }
        button.danger:hover {
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.3);
        }
        button.warning {
            background: var(--orange);
        }
        button.warning:hover {
            box-shadow: 0 6px 16px rgba(245, 158, 11, 0.3);
        }
        button.secondary {
            background: var(--slate);
        }
        button.secondary:hover {
            box-shadow: 0 6px 16px rgba(100, 116, 139, 0.3);
        }
        button.gold {
            background: linear-gradient(145deg, var(--gold), var(--gold-dark));
            color: #fff;
        }
        button.gold:hover {
            box-shadow: 0 6px 16px rgba(212, 175, 55, 0.35);
        }
        button.ghost {
            background: transparent;
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }
        button.ghost:hover {
            border-color: var(--gold);
            background: var(--gold-light);
            color: var(--gold-dark);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ============================================================
               TABLES
            ============================================================ */
        .data-table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            margin-top: 0.5rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            background: var(--bg-card);
        }
        .data-table th {
            background: var(--header-bg);
            color: #fff;
            font-weight: 700;
            padding: 0.9rem 0.7rem;
            text-align: center;
            white-space: nowrap;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }
        .data-table td {
            padding: 0.7rem 0.5rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            color: var(--text-primary);
        }
        .data-table tbody tr:nth-child(even) {
            background: var(--table-stripe);
        }
        .data-table tbody tr:hover td {
            background: var(--table-hover);
        }

        /* ============================================================
               BADGES
            ============================================================ */
        .shift-badge {
            background: #e0f2fe;
            color: #0284c7;
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.75rem;
            display: inline-block;
        }
        [data-theme="dark"] .shift-badge {
            background: #1a3a4f;
            color: #7dd3fc;
        }

        .status-confirmed {
            background: #dcfce7;
            color: #15803d;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
        }
        [data-theme="dark"] .status-confirmed {
            background: #1a3a2a;
            color: #6ee7b7;
        }

        .status-pending {
            background: #fff3e3;
            color: #b45309;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
        }
        [data-theme="dark"] .status-pending {
            background: #3a2a1a;
            color: #fbbf24;
        }

        /* ============================================================
               MENU
            ============================================================ */
        .menu-toggle-container {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .menu-toggle-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--header-bg);
            color: #fff;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 2rem;
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .menu-toggle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }
        .menu-toggle-btn .menu-icon {
            font-size: 1.3rem;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            backdrop-filter: blur(3px);
        }
        .menu-overlay-show {
            opacity: 1;
            visibility: visible;
        }

        .menu-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 340px;
            max-width: 88vw;
            height: 100%;
            background: var(--bg-card);
            z-index: 999;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.15);
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-radius: var(--radius-lg) 0 0 var(--radius-lg);
            border-left: 2px solid var(--gold);
        }
        .menu-panel.menu-open {
            transform: translateX(0);
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1.5rem 1rem 1.5rem;
            border-bottom: 2px solid var(--border-color);
            background: var(--header-bg);
            color: #fff;
            border-radius: var(--radius-lg) 0 0 0;
        }
        .menu-title {
            font-size: 1.2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .menu-close-btn {
            background: var(--red);
            color: #fff;
            border: none;
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            transition: var(--transition);
        }
        .menu-close-btn:hover {
            transform: rotate(90deg);
        }

        .menu-items {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
            border: 2px solid transparent;
            color: var(--text-primary);
        }
        .menu-item:hover {
            background: var(--gold-light);
            border-color: var(--gold);
            transform: translateX(-4px);
        }
        .menu-item-active {
            background: linear-gradient(145deg, var(--gold), var(--gold-dark)) !important;
            color: #fff !important;
            border-color: var(--gold) !important;
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.25);
        }
        .menu-item-active .menu-item-text {
            color: #fff !important;
        }
        .menu-item-icon {
            font-size: 1.3rem;
            width: 2rem;
            text-align: center;
        }
        .menu-item-text {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .section-title-bar {
            display: none;
            align-items: center;
            justify-content: center;
            background: var(--header-bg);
            color: #fff;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            gap: 0.5rem;
        }
        .section-title-bar .title-icon {
            font-size: 1.2rem;
        }

        .content-section {
            display: none;
            animation: fadeSlide 0.35s ease;
        }
        .content-section.active-section {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
               TOAST NOTIFICATIONS
            ============================================================ */
        .toast-container {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-width: 400px;
            width: 90%;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-card);
            border-right: 5px solid var(--gold);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: toastIn 0.4s ease;
            pointer-events: auto;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .toast.toast-success {
            border-right-color: var(--green);
        }
        .toast.toast-error {
            border-right-color: var(--red);
        }
        .toast.toast-warning {
            border-right-color: var(--orange);
        }
        .toast .toast-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        .toast .toast-msg {
            flex: 1;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .toast .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 0.2rem;
            transition: var(--transition);
        }
        .toast .toast-close:hover {
            color: var(--red);
            transform: scale(1.2);
        }

        @keyframes toastIn {
            from {
                opacity: 0;

        window.showToast = function(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
            <span class="toast-icon">${icons[type] || 'ℹ️'}</span>
            <span class="toast-msg">${message}</span>
            <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
          `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        };

        // Override showMessage to use toast
        const originalShowMessage = window.showMessage;
        window.showMessage = function(container, msg, isError = false) {
            if (typeof container === 'string' && container.startsWith('#') && document.getElementById(container
                .substring(1))) {
                const div = document.createElement('div');
                div.className = `alert ${isError ? 'alert-error' : ''}`;
                div.textContent = msg;
                const el = document.getElementById(container.substring(1));
                if (el) { el.prepend(div);
                    setTimeout(() => div.remove(), 4000); }
                return;
            }
            // Fallback to toast
            window.showToast(msg, isError ? 'error' : 'success');

            try {
                const q = query(collection(db, "Users"), where("Emp_Code", "==", empCode));

                const data = snap.docs[0].data();

        async function getEmployeesByDepartment(dept) {
            const all = await getAllEmployeesCached();
            let employees = all.filter(u => u.Department === dept && u.Role === 'موظف');
            const supervisors = all.filter(u => u.Department === dept && u.Role === 'مشرف قسم');
            for (let sup of supervisors) {
                if (!employees.some(emp => emp.Emp_Code === sup.Emp_Code)) employees.push(sup);
            }
            if (dept === 'كنترول السبك') {
                employees = employees.filter(u => u.Emp_Code !== '8063');
            }
            employees.sort((a, b) => {
                if (a.Role === 'مشرف قسم' && b.Role !== 'مشرف قسم') return -1;
                if (a.Role !== 'مشرف قسم' && b.Role === 'مشرف قسم') return 1;
                return 0;
            });
            return employees;
        }

        function validateShiftWeek(weekStart, weekEnd) {
            if (!weekStart || !weekEnd) return false;
            const startDate = new Date(weekStart);
            const endDate = new Date(weekEnd);
            if (isNaN(startDate) || isNaN(endDate)) return false;
            const isFriday = startDate.getDay() === 5;
            const isThursday = endDate.getDay() === 4;
            const diffDays = Math.round((endDate - startDate) / (1000 * 60 * 60 * 24));
            return isFriday && isThursday && diffDays === 6;
        }

        async function getExistingShiftsForWeek(weekStart, empCodes) {
            if (!empCodes.length) return new Set();
            // Use "in" query but limited to 10, so we split if needed
            const existing = new Set();
            for (let i = 0; i < empCodes.length; i += 10) {
                const chunk = empCodes.slice(i, i + 10);
                const q = query(collection(db, "Shifts"), where("WeekStart", "==", weekStart), where("Emp_Code", "in",
                    chunk));
                const snap = await getDocs(q);
                snap.docs.forEach(doc => existing.add(doc.data().Emp_Code));
            }
            return existing;
        }

        async function getExistingOvertimeForDate(date, empCodes) {
            if (!empCodes.length) return new Set();
            const existing = new Set();
            for (let i = 0; i < empCodes.length; i += 10) {
                const chunk = empCodes.slice(i, i + 10);
                const q = query(collection(db, "Overtime"), where("Date", "==", date), where("Emp_Code", "in", chunk));
                const snap = await getDocs(q);
                snap.docs.forEach(doc => existing.add(doc.data().Emp_Code));
            }
            return existing;
        }

            const today = new Date();
            const day = today.getDay();
            let diffToFriday = (day - 5 + 7) % 7;
            if (day === 5) diffToFriday = 0;
            const start = new Date(today);
            start.setDate(today.getDate() - diffToFriday);
            const end = new Date(start);
            end.setDate(start.getDate() + 6);
            const format = (d) => d.toISOString().split('T')[0];
            return { start: format(start), end: format(end) };
        }

        function getDayOrder(dayName) {
            const map = { 'الجمعة': 0, 'السبت': 1, 'الأحد': 2, 'الإثنين': 3, 'الثلاثاء': 4, 'الأربعاء': 5, 'الخميس': 6 };
            return map[dayName] ?? 99;
        }

        function groupAndSortByDepartment(data, getDepartment, getDayName = null) {
            const groups = new Map();
            for (let item of data) {
                const dept = getDepartment(item) || 'بدون قسم';
                if (!groups.has(dept)) groups.set(dept, []);
                groups.get(dept).push(item);
            }
            const sortedGroups = Array.from(groups.entries()).sort((a, b) => a[0].localeCompare(b[0]));
            for (let [deptName, items] of sortedGroups) {
                if (getDayName) items.sort((a, b) => getDayOrder(getDayName(a)) - getDayOrder(getDayName(b)));
                else items.sort((a, b) => new Date(a.WeekStart) - new Date(b.WeekStart));
                items.sort((a, b) => {
                    if (a.Role === 'مشرف قسم' && b.Role !== 'مشرف قسم') return -1;
                    if (a.Role !== 'مشرف قسم' && b.Role === 'مشرف قسم') return 1;
                    return 0;
                });
            }
            return sortedGroups;
        }

        function attachToggleButton(containerId, wrapperId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const oldBtn = document.getElementById(`toggleBtn_${wrapperId}`);
            if (oldBtn) oldBtn.remove();
            const wrapper = document.getElementById(wrapperId);
            if (wrapper) {
                const toggleBtn = document.createElement('button');
                toggleBtn.id = `toggleBtn_${wrapperId}`;
                toggleBtn.textContent = 'إخفاء الجدول';
                toggleBtn.className = 'hide-toggle-btn';
                toggleBtn.onclick = () => {
                    if (wrapper.style.display === 'none') {
                        wrapper.style.display = '';

                    } else {
                        wrapper.style.display = 'none';
                        toggleBtn.textContent = 'إظهار الجدول';
                    }
                };
                wrapper.parentNode.insertBefore(toggleBtn, wrapper.nextSibling);
            }
        }

        // ============================================================
        //  MENU BUILDER (with visibility filtering)
        // ============================================================
        async function createMainButtons(buttonsConfig, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            let finalConfig = buttonsConfig;
            if (containerId === 'employeeContent' || containerId === 'supervisorContent') {
                try {
                    const visSettings = await getVisibilitySettings();
                    const map = containerId === 'employeeContent' ?
                        { 'dashboard': 'show_balance', 'shifts': 'show_shifts', 'overtime': 'show_overtime',
                            'leave': 'show_leave', 'changepass': 'show_changepass' } :
                        { 'info': 'show_supervisor_info', 'shifts': 'show_supervisor_shifts',
                            'overtime': 'show_supervisor_ot', 'viewshifts': 'show_supervisor_viewshifts',
                            'viewot': 'show_supervisor_viewot', 'deptleaves': 'show_supervisor_deptleaves',
                            'myleave': 'show_supervisor_myleave', 'myshifts': 'show_supervisor_myshifts',
                            'myovertime': 'show_supervisor_myot', 'myleaves': 'show_supervisor_myleaves',
                            'changepass': 'show_changepass'
                        };
                    finalConfig = buttonsConfig.filter(cfg => {
                        const settingKey = map[cfg.id];
                        if (!settingKey) return true;
                        return visSettings[settingKey] !== false;
                    });
                } catch (e) { console.error('Visibility error:', e); }
            }

            container.innerHTML = `
            <div class="menu-toggle-container">
              <button class="menu-toggle-btn" id="menuToggle_${containerId}" onclick="toggleMenu('${containerId}')">
                <span class="menu-icon">☰</span>
                <span class="menu-text">القائمة</span>
              </button>
              <div class="menu-overlay" id="menuOverlay_${containerId}" onclick="toggleMenu('${containerId}')"></div>
              <div class="menu-panel" id="menuPanel_${containerId}">
                <div class="menu-header">
                  <span class="menu-title">📋 القائمة</span>
                  <button class="menu-close-btn" onclick="toggleMenu('${containerId}')">✕</button>
                </div>
                <div class="menu-items" id="menuItems_${containerId}"></div>
              </div>
            </div>
            <div class="section-title-bar" id="sectionTitle_${containerId}">
              <span class="title-icon" id="sectionTitleIcon_${containerId}">📋</span>
              <span id="activeSectionTitle_${containerId}"></span>
            </div>
            <div id="sectionsContainer_${containerId}"></div>
          `;

            const menuItemsDiv = document.getElementById(`menuItems_${containerId}`);
            const sectionsDiv = document.getElementById(`sectionsContainer_${containerId}`);

            finalConfig.forEach((cfg, idx) => {
                const menuItem = document.createElement('div');
                menuItem.className = 'menu-item';
                menuItem.id = `menuItem_${containerId}_${cfg.id}`;
                const icon = cfg.label.match(/^.{1,2}/)?.[0] || '📋';
                const text = cfg.label.replace(/^.{1,2}\s*/, '');
                menuItem.innerHTML =
                    `<span class="menu-item-icon">${icon}</span><span class="menu-item-text">${text}</span>`;
                menuItem.onclick = () => {
                    document.getElementById(`menuPanel_${containerId}`).classList.remove('menu-open');
                    document.getElementById(`menuOverlay_${containerId}`).classList.remove('menu-overlay-show');
                    document.querySelectorAll(`#sectionsContainer_${containerId} .content-section`).forEach(sec =>
                        sec.classList.remove('active-section'));
                    document.querySelectorAll(`#menuItems_${containerId} .menu-item`).forEach(item => item
                        .classList.remove('menu-item-active'));
                    const target = document.getElementById(`section_${containerId}_${cfg.id}`);
                    if (target) target.classList.add('active-section');
                    menuItem.classList.add('menu-item-active');
                    document.getElementById(`activeSectionTitle_${containerId}`).textContent = cfg.label;
                    document.getElementById(`sectionTitle_${containerId}`).style.display = 'flex';
                    const iconMatch = cfg.label.match(/^.{1,2}/);
                    if (iconMatch) document.getElementById(`sectionTitleIcon_${containerId}`).textContent =
                    iconMatch[0];
                    if (cfg.onShow) cfg.onShow();
                };
                menuItemsDiv.appendChild(menuItem);

                const sectionDiv = document.createElement('div');
                sectionDiv.id = `section_${containerId}_${cfg.id}`;
                sectionDiv.className = 'content-section';
                sectionDiv.innerHTML = cfg.content;
                sectionsDiv.appendChild(sectionDiv);
            });

            if (finalConfig.length > 0) {
                const firstItem = document.getElementById(`menuItem_${containerId}_${finalConfig[0].id}`);

        window.submitLeaveGeneric = async function(fromId, toId, actingId, roleContext) {
            const fromDate = document.getElementById(fromId).value;
            const toDate = document.getElementById(toId).value;
            const actingCode = document.getElementById(actingId).value;
            if (!fromDate || !toDate || !actingCode) {
                window.showToast('يرجى تحديد جميع التواريخ واختيار القائم بالأعمال', 'warning');
                return;

                window.showToast('تاريخ البداية لا يمكن أن يكون بعد تاريخ النهاية', 'error');
                return;
            }
            showLoading();
            try {
                const duration = Math.round((new Date(toDate) - new Date(fromDate)) / (1000 * 60 * 60 * 24)) + 1;
                const allUsers = await getAllEmployeesCached();
                const actingUser = allUsers.find(u => u.Emp_Code === actingCode);
                const status = (roleContext === 'employee') ? 'pending' : 'confirmed';
                const leaveRef = doc(collection(db, "Leaves"));
                await setDoc(leaveRef, {
                    Emp_Code: currentUser.Emp_Code,
                    Emp_Name: currentUser.Emp_Name,
                    Department: currentUser.Department,
                    FromDate: fromDate,
                    ToDate: toDate,
                    Duration: duration,
                    ActingEmpCode: actingCode,
                    ActingEmpName: actingUser ? actingUser.Emp_Name : '-',
                    Status: status
                });
                window.showToast(status === 'confirmed' ? '✅ تم تسجيل وإعتماد الإجازة تلقائياً' :
                    '✅ تم تقديم طلب الإجازة بانتظار اعتماد المشرف', 'success');
                document.getElementById(fromId).value = '';
                document.getElementById(toId).value = '';
                document.getElementById(actingId).value = '';
                if (roleContext === 'employee') await loadMyLeaves();
                else if (roleContext === 'supervisor') await loadSupMyLeaves();

        window.showDeptEmployeesForShift = async function() {
            showLoading();
            try {
                const weekStart = document.getElementById('supWeekStart').value;
                const weekEnd = document.getElementById('supWeekEnd').value;
                if (!weekStart || !weekEnd) { window.showToast('اختر بداية ونهاية الأسبوع', 'warning'); return; }
                if (!validateShiftWeek(weekStart, weekEnd)) { window.showToast(
                        'يجب أن يكون بداية الأسبوع جمعة ونهايته خميس (بفارق 6 أيام)', 'error'); return; }
                const employees = await getEmployeesByDepartment(currentUser.Department);
                if (!employees.length) { document.getElementById('supShiftEmployeesList').innerHTML =
                        '<div class="alert">لا يوجد موظفين</div>'; return; }
                const empCodes = employees.map(e => e.Emp_Code);
                // Fetch existing shifts for this week using "in" query
                const existingSet = await getExistingShiftsForWeek(weekStart, empCodes);
                // Build map
                const shiftMap = {};
                // We need to get the shift type for each existing employee
                // Instead of fetching all, we already have existingSet (emp codes only)
                // To get the shift type, we need to fetch the documents.
                // We'll fetch again using "in" for each chunk, but we can optimize by fetching all for this week once
                // Actually we already have getExistingShiftsForWeek that returns a set, but we need shift types.
                // So let's do a proper fetch:
                const shiftData = {};
                for (let i = 0; i < empCodes.length; i += 10) {
                    const chunk = empCodes.slice(i, i + 10);
                    const q = query(collection(db, "Shifts"), where("WeekStart", "==", weekStart), where("Emp_Code",
                        "in", chunk));
                    const snap = await getDocs(q);
                    snap.docs.forEach(doc => { shiftData[doc.data().Emp_Code] = doc.data().ShiftType; });
                }

                let html =
                    `<div class="data-table-wrapper" id="supShiftEmployeesWrapper"><table class="data-table"><thead><tr><th>الإسم</th><th>الوردية</th></tr></thead><tbody>`;
                for (let emp of employees) {

        window.saveAllOvertimeSup = async function(date, day) {
            showLoading();
            try {
                const employees = await getEmployeesByDepartment(currentUser.Department);
                const empCodes = employees.map(e => e.Emp_Code);
                const existingSet = await getExistingOvertimeForDate(date, empCodes);
                let existingChecked = 0;
                for (let emp of employees) {
                    const chk = document.getElementById(`ot_${emp.Emp_Code}`);
                    if (chk && chk.checked && existingSet.has(emp.Emp_Code)) existingChecked++;
                }
                if (existingChecked > 0 && !confirm(
                        `توجد أضافيات مسجلة مسبقاً لـ ${existingChecked} موظف/موظفين. هل تريد تحديث الكل?`)) {
                    window.showToast('تم إلغاء الحفظ', 'warning');
                    return;
                }
                const batch = writeBatch(db);
                let addedCount = 0,
                    updatedCount = 0,
                    deletedCount = 0;
                for (let emp of employees) {
                    const chk = document.getElementById(`ot_${emp.Emp_Code}`);
                    if (chk) {
                        const shiftSelect = document.getElementById(`otShift_${emp.Emp_Code}`);
                        const empShiftType = shiftSelect ? shiftSelect.value : 'وسطي';
                        const otRef = doc(db, "Overtime", `${emp.Emp_Code}_${date}`);
                        if (chk.checked) {

                                Status: "pending",
                                ShiftType: empShiftType,
                                Department: emp.Department  // added
                            });

                            else addedCount++;
                        } else {
                            if (existingSet.has(emp.Emp_Code)) { batch.delete(otRef);
                                deletedCount++; }
                        }
                    }
                }

                    `✅ تم حفظ الأضافيات (${addedCount} جديدة، ${updatedCount} محدثة، ${deletedCount} محذوفة)`,

        };

        window.deleteDataByDateRangeAndDept = async function() {
            const dept = document.getElementById('deleteDeptSelect').value;
            const from = document.getElementById('deleteDateFrom').value;
            const to = document.getElementById('deleteDateTo').value;
            const type = document.getElementById('deleteType').value;
            if (!from || !to) { window.showToast('يرجى تحديد تاريخ البداية والنهاية', 'warning'); return; }
            if (!confirm(
                    `هل أنت متأكد من حذف ${type === 'shifts' ? 'الورديات' : type === 'overtime' ? 'الأضافيات' : 'الورديات والأضافيات'} للقسم ${dept || 'الكل'} من ${from} إلى ${to}؟`
                    )) return;
            showLoading();
            try {
                let constraints = [];
                if (dept) constraints.push(where("Department", "==", dept));
                // We need to handle date ranges differently for shifts and overtime
                const batch = writeBatch(db);
                let deletedCount = 0;
                if (type === 'shifts' || type === 'both') {
                    let shiftConstraints = [...constraints];
                    if (from) shiftConstraints.push(where("WeekStart", ">=", from));
                    if (to) shiftConstraints.push(where("WeekEnd", "<=", to));
                    const q = query(collection(db, "Shifts"), ...shiftConstraints);
                    const snap = await getDocs(q);
                    snap.docs.forEach(doc => { batch.delete(doc.ref);
                        deletedCount++; });
                }
                if (type === 'overtime' || type === 'both') {
                    let otConstraints = [...constraints];
                    if (from) otConstraints.push(where("Date", ">=", from));
                    if (to) otConstraints.push(where("Date", "<=", to));
                    const q = query(collection(db, "Overtime"), ...otConstraints);
                    const snap = await getDocs(q);
                    snap.docs.forEach(doc => { batch.delete(doc.ref);
                        deletedCount++; });
                }
                await batch.commit();
                window.showToast(`✅ تم حذف ${deletedCount} سجل`, 'success');
                if (type === 'shifts' || type === 'both') await loadAdminShifts();
                if (type === 'overtime' || type === 'both') await loadAdminOvertime();
            } catch (e) { window.showToast('خطأ: ' + e.message, 'error'); } finally { hideLoading(); }
        };

        window.exportAllData = async function() {
            showLoading();
            try {
                const users = await getAllEmployeesCached();
                const shiftsSnap = await getDocs(collection(db, "Shifts"));
                const shifts = shiftsSnap.docs.map(d => d.data());
                const otsSnap = await getDocs(collection(db, "Overtime"));
                const ots = otsSnap.docs.map(d => d.data());
                const userMap = new Map();
                users.forEach(u => userMap.set(u.Emp_Code, { name: u.Emp_Name, dept: u.Department }));
                const usersForExport = users.map(u => ({
                    "الكود": u.Emp_Code,
                    "الاسم": u.Emp_Name,
                    "القسم": u.Department,
                    "الدور": u.Role,
                    "رصيد الأجازات": u.Leave_Balance ?? 0,
                    "كلمة المرور": u.Password
                }));
                const shiftsWithNames = shifts.map(s => ({
                    "القسم": userMap.get(s.Emp_Code)?.dept || '-',
                    "الكود": s.Emp_Code,
                    "الإسم": userMap.get(s.Emp_Code)?.name || s.Emp_Code,
                    "بداية الأسبوع": s.WeekStart,
                    "نهاية الأسبوع": s.WeekEnd,
                    "الوردية": s.ShiftType
                }));
                const grouped = new Map();
                for (let ot of ots) {
                    const emp = userMap.get(ot.Emp_Code);
                    const record = {
                        "الكود": ot.Emp_Code,
                        "الإسم": emp?.name || ot.Emp_Code,
                        "القسم": emp?.dept || '-',
                        "اليوم": ot.Day,
                        "الوردية": ot.ShiftType || '-',
                        "التاريخ": ot.Date,
                        "الحالة": ot.Status === 'confirmed' ? 'تم الحضور' : 'قيد الانتظار'
                    };
                    const key = `${ot.Date}|${ot.ShiftType || 'بدون'}`;
                    if (!grouped.has(key)) grouped.set(key, []);
                    grouped.get(key).push(record);
                }
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(usersForExport), "الموظفين");
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(shiftsWithNames), "الورديات");
                for (let [key, records] of grouped.entries()) {
                    records.sort((a, b) => a["القسم"].localeCompare(b["القسم"]) || a["الإسم"].localeCompare(b[
                    "الإسم"]));
                    const finalData = records.map((rec, idx) => ({
                        "م": idx + 1,
                        "الكود": rec["الكود"],
                        "الإسم": rec["الإسم"],
                        "القسم": rec["القسم"],
                        "اليوم": rec["اليوم"],
                        "الوردية": rec["الوردية"],
                        "التاريخ": rec["التاريخ"],
                        "الحالة": rec["الحالة"]
                    }));
                    const sheet = XLSX.utils.json_to_sheet(finalData, { header: ["م", "الكود", "الإسم", "القسم", "اليوم",
                            "الوردية", "التاريخ", "الحالة"
                        ] });
                    sheet['!cols'] = [{ wch: 5 }, { wch: 12 }, { wch: 20 }, { wch: 15 }, { wch: 10 }, { wch: 18 },
                        { wch: 12 }, { wch: 12 }
                    ];
                    const title = "أمر تشغيل ساعات اضافية إدارة المركزية التجهيزية";
                    const dateTitle = `تاريخ الإصدار: ${new Date().toLocaleDateString('ar-EG')}`;
                    const newRows = [
                        [title, ...Array(7).fill(null)],
                        [dateTitle, ...Array(7).fill(null)],
                        []
                    ];
                    const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                    for (let i = 0; i < data.length; i++) newRows.push(data[i]);
                    const newSheet = XLSX.utils.aoa_to_sheet(newRows);
                    newSheet['!cols'] = sheet['!cols'];
                    if (!newSheet['!merges']) newSheet['!merges'] = [];
                    newSheet['!merges'].push({ s: { r: 0, c: 0 }, e: { r: 0, c: 7 } });
                    const datePart = key.split('|')[0];
                    const shiftPart = key.split('|')[1].replace(/[\/\\:*?"<>|]/g, '');
                    let sheetName = `${datePart} ${shiftPart}`.substring(0, 31);
                    let finalName = sheetName;
                    let c = 1;
                    while (wb.SheetNames.includes(finalName)) finalName = `${sheetName} (${c++})`;
                    XLSX.utils.book_append_sheet(wb, newSheet, finalName);
                }
                XLSX.writeFile(wb, `بيانات_النظام_${new Date().toLocaleDateString()}.xlsx`);
                window.showToast('✅ تم تصدير جميع البيانات', 'success');
            } catch (e) { window.showToast('خطأ في التصدير: ' + e.message, 'error'); } finally { hideLoading(); }
        };

            printWindow.document.write(
                `<html dir="rtl"><head><title>طباعة بيان الإجازات</title><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"><style>body{font-family:'Tajawal',sans-serif;margin:0;padding:0;background:#fff}.print-page-wrapper{page-break-after:always;page-break-inside:avoid;height:99vh;max-height:99vh;width:100%;box-sizing:border-box;overflow:hidden}.print-page-wrapper:last-of-type{page-break-after:auto}.print-area{border:2px solid #000;padding:0.5cm 1cm 1.5cm 1cm;margin:0;height:100%;box-sizing:border-box;display:flex;flex-direction:column}.print-title{font-size:1.5rem;font-weight:bold;text-align:center;margin-bottom:0.3rem}.print-subtitle{text-align:center;margin-bottom:0.3rem;font-size:1rem}.print-table{width:100%;border-collapse:collapse;margin-bottom:auto;font-size:0.85rem}.print-table th,.print-table td{border:1px solid #ccc;padding:3px 5px;text-align:center}.print-table th{background:#1e293b!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.print-footer{display:flex;justify-content:space-between;margin-top:0.5rem;padding-top:0.5rem;border-top:2px solid #000;font-size:1rem;font-weight:bold;padding-bottom:1.5cm}.footer-right{text-align:center}.footer-left{text-align:center}</style></head><body>${printContent}</body></html>`
            );
            printWindow.document.close();
            setTimeout(() => printWindow.print(), 500);
        };

        // ============================================================
        //  WELCOME MESSAGE (unchanged)
        // ============================================================
        let tempAudioBase64 = null;

        window.handleAudioFile = function(event) {
            const file = event.target.files[0];
            const fileNameDiv = document.getElementById('audioFileName');
            if (!file) { fileNameDiv.textContent = ''; return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                tempAudioBase64 = e.target.result;
                fileNameDiv.textContent = `🎵 ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
            };
            reader.readAsDataURL(file);
        };

        window.previewAudio = function() {
            if (tempAudioBase64) {
                const audio = new Audio(tempAudioBase64);
                audio.play().catch(() => window.showToast('⚠️ لا يمكن تشغيل الصوت', 'warning'));
            } else {
                window.showToast('⚠️ يرجى تحميل ملف صوتي أولاً', 'warning');
            }
        };

        window.loadWelcomeMessageSettings = async function() {
            showLoading();
            try {
                const settingsRef = doc(db, "Settings", "welcomeMessage");
                const snap = await getDoc(settingsRef);
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('welcomeEnabled').value = data.enabled ? 'true' : 'false';
                    document.getElementById('welcomeIcon').value = data.icon || '🎉';
                    document.getElementById('welcomeTitle').value = data.title || '';
                    document.getElementById('welcomeBody').value = data.body || '';
                    if (data.audio) {
                        tempAudioBase64 = data.audio;
                        document.getElementById('audioFileName').textContent = '🎵 نغمة محفوظة (Base64)';
                    }
                }
                await loadWelcomeHistory();
            } finally { hideLoading(); }
        };

        window.saveWelcomeMessage = async function() {
            showLoading();
            try {
                const enabled = document.getElementById('welcomeEnabled').value === 'true';
                const icon = document.getElementById('welcomeIcon').value || '🎉';
                const title = document.getElementById('welcomeTitle').value.trim();
                const body = document.getElementById('welcomeBody').value.trim();
                if (!title || !body) { window.showToast('يرجى ملء العنوان والنص', 'warning'); return; }
                const payload = { enabled, icon, title, body, updatedAt: new Date().toISOString() };
                if (tempAudioBase64) payload.audio = tempAudioBase64;
                await setDoc(doc(db, "Settings", "welcomeMessage"), payload);
                window.showToast('✅ تم حفظ الرسالة والنغمة', 'success');
                await loadWelcomeHistory();
            } catch (e) { window.showToast('خطأ: ' + e.message, 'error'); } finally { hideLoading(); }
        };

        window.previewWelcomeMessage = function() {
            const icon = document.getElementById('welcomeIcon').value || '🎉';
            const title = document.getElementById('welcomeTitle').value || 'معاينة';
            const body = document.getElementById('welcomeBody').value || 'نص المعاينة...';
            showWelcomeModal({ icon, title, body, audio: tempAudioBase64 });
        };

        window.loadWelcomeHistory = async function() {
            try {
                const snap = await getDoc(doc(db, "Settings", "welcomeMessage"));
                const container = document.getElementById('welcomeHistoryList');
                if (!container) return;
                if (!snap.exists() || !snap.data().title) {
                    container.innerHTML = '<div class="alert">لا توجد رسائل محفوظة</div>';
                    return;
                }
                const data = snap.data();
                const status = data.enabled ? '<span class="status-confirmed">مفعلة</span>' :
                    '<span class="status-pending">معطلة</span>';
                const hasAudio = data.audio ? '🎵 نعم' : '❌ لا';
                container.innerHTML =
                    `<div class="data-table-wrapper"><table class="data-table"><thead><tr><th>الحالة</th><th>الأيقونة</th><th>العنوان</th><th>النص</th><th>نغمة</th><th>آخر تحديث</th></tr></thead><tbody><tr><td>${status}</td><td style="font-size:1.5rem;">${data.icon || '🎉'}</td><td>${data.title}</td><td style="max-width:200px; overflow:hidden; text-overflow:ellipsis;">${data.body}</td><td>${hasAudio}</td><td>${data.updatedAt ? new Date(data.updatedAt).toLocaleDateString('ar-EG') : '-'}</td></tr></tbody></table></div>`;
            } catch (e) {}
        };

        window.showWelcomeModal = function(data) {
            const modal = document.getElementById('welcomeModal');
            const iconDiv = document.getElementById('welcomeModalIcon');
            const titleDiv = document.getElementById('welcomeModalTitle');
            const bodyDiv = document.getElementById('welcomeModalBody');
            if (iconDiv) iconDiv.textContent = data.icon || '🎉';
            if (titleDiv) titleDiv.textContent = data.title || 'رسالة ترحيبية';
            if (bodyDiv) bodyDiv.innerHTML = (data.body || '').replace(/\n/g, '<br>');
            if (modal) modal.style.display = 'flex';
            if (data.audio) {
                try {
                    const audio = new Audio(data.audio);
                    audio.play().catch(() => {});
                } catch (e) {}
            }
        };

        window.closeWelcomeModal = function() {
            const modal = document.getElementById('welcomeModal');
            if (modal) modal.style.display = 'none';
        };

        window.checkAndShowWelcome = async function() {
            try {
                const snap = await getDoc(doc(db, "Settings", "welcomeMessage"));
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.enabled && data.title && data.body) {
                        if (!sessionStorage.getItem('welcomeShown')) {
                            setTimeout(() => showWelcomeModal(data), 800);
                            sessionStorage.setItem('welcomeShown', 'true');
                        }
                    }
                }
            } catch (e) {}
        };

        // ============================================================
        //  VISIBILITY SETTINGS (unchanged)
        // ============================================================
        const VISIBILITY_FEATURES = [
            { id: 'show_balance', label: '🏦 رصيد الأجازات', default: true },
            { id: 'show_shifts', label: '📅 وردياتي', default: true },
            { id: 'show_overtime', label: '✅ الأضافي الخاص بي', default: true },
            { id: 'show_leave', label: '💼 تسجيل إجازة', default: true },
            { id: 'show_changepass', label: '🔐 تغيير كلمة المرور', default: true },
            { id: 'show_supervisor_info', label: '👤 معلوماتي (مشرف)', default: true },
            { id: 'show_supervisor_shifts', label: '📅 تسجيل الورديات (مشرف)', default: true },
            { id: 'show_supervisor_ot', label: '⏱️ تسجيل أضافي (مشرف)', default: true },
            { id: 'show_supervisor_viewshifts', label: '📋 عرض الورديات (مشرف)', default: true },
            { id: 'show_supervisor_viewot', label: '⏱️ عرض الأضافيات (مشرف)', default: true },
            { id: 'show_supervisor_deptleaves', label: '💼 إجازات القسم (مشرف)', default: true },
            { id: 'show_supervisor_myleave', label: '💼 تسجيل إجازتي (مشرف)', default: true },
            { id: 'show_supervisor_myshifts', label: '📅 وردياتي الشخصية (مشرف)', default: true },
            { id: 'show_supervisor_myot', label: '⏱️ أضافيي الشخصية (مشرف)', default: true },
            { id: 'show_supervisor_myleaves', label: '📋 إجازاتي (مشرف)', default: true },
        ];

        window.toggleAllVisibility = function(checked) {
            document.querySelectorAll('#visibilitySettingsContainer input[type="checkbox"]').forEach(cb => cb.checked =
                checked);
            window.showToast(checked ? '☑️ تم تفعيل جميع العناصر' : '❌ تم إلغاء جميع العناصر', 'info');
        };

        window.loadVisibilitySettings = async function() {
            showLoading();
            try {
                const container = document.getElementById('visibilitySettingsContainer');
                if (!container) return;
                const settingsRef = doc(db, "Settings", "visibility");
                const snap = await getDoc(settingsRef);
                let savedSettings = {};
                if (snap.exists()) savedSettings = snap.data();
                let html = '<div class="vis-grid">';
                for (let feat of VISIBILITY_FEATURES) {
                    const isChecked = savedSettings[feat.id] !== false ? 'checked' : '';
                    html += `
                <div class="vis-item">
                  <input type="checkbox" id="vis_${feat.id}" ${isChecked}>
                  <label for="vis_${feat.id}">${feat.label}</label>
                </div>
              `;
                }
                html +=
                    '</div><button onclick="saveVisibilitySettings()" class="success" style="margin-top:1.2rem; padding:0.7rem 2rem;">💾 حفظ الإعدادات</button>';
                container.innerHTML = html;
            } finally { hideLoading(); }
        };

        window.saveVisibilitySettings = async function() {
            showLoading();
            try {
                const settings = {};
                for (let feat of VISIBILITY_FEATURES) {
                    const cb = document.getElementById('vis_' + feat.id);
                    settings[feat.id] = cb ? cb.checked : true;
                }
                await setDoc(doc(db, "Settings", "visibility"), settings);
                window.showToast('✅ تم حفظ إعدادات الرؤية', 'success');
            } catch (e) { window.showToast('خطأ: ' + e.message, 'error'); } finally { hideLoading(); }
        };

        window.getVisibilitySettings = async function() {
            const defaults = {};
            VISIBILITY_FEATURES.forEach(f => defaults[f.id] = f.default);
            try {
                const snap = await getDoc(doc(db, "Settings", "visibility"));
                if (snap.exists()) {
                    const saved = snap.data();
                    return { ...defaults, ...saved };
                }
            } catch (e) {}
            return defaults;
        };

        // ============================================================
        //  SECURITY
        // ============================================================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey &&
                    e.keyCode === 85) || (e.ctrlKey && e.keyCode === 83)) e.preventDefault();
        });
        setInterval(() => console.clear(), 1000);

        console.log('🚀 New Egypt Gold System v2.0 — تم التطوير بواسطة م/ أحمد مسلم');
    </script>
</body>
</html>
